spring:
  application:
    name: JavaAISandbox
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}        # set via env var
      base-url: https://api.anthropic.com  # or your proxy URL
      chat:
        options:
          model: claude-sonnet-4-5-20250929
          max-tokens: 16000

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG           # helpful during dev to see raw SSE chunks
